<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="128" cy="128" r="122"/>
    </clipPath>
    <radialGradient id="space-bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#12111f"/>
      <stop offset="100%" stop-color="#06050d"/>
    </radialGradient>
    <radialGradient id="asteroid-grad" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#8a8a96"/>
      <stop offset="100%" stop-color="#4a4a54"/>
    </radialGradient>
    <filter id="amber-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtle-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="128" cy="128" r="126" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="2"/>

  <!-- Space background -->
  <circle cx="128" cy="128" r="122" fill="url(#space-bg)" clip-path="url(#circle-clip)"/>

  <!-- Faint star field -->
  <g clip-path="url(#circle-clip)" opacity="0.5">
    <circle cx="45" cy="40" r="1" fill="#ffffff"/>
    <circle cx="90" cy="28" r="0.8" fill="#ffffff"/>
    <circle cx="170" cy="22" r="1.2" fill="#ffffff"/>
    <circle cx="210" cy="55" r="0.7" fill="#ffffff"/>
    <circle cx="230" cy="90" r="1" fill="#ffffff"/>
    <circle cx="32" cy="85" r="0.8" fill="#ffffff"/>
    <circle cx="200" cy="38" r="0.6" fill="#ffffff"/>
    <circle cx="60" cy="65" r="0.7" fill="#ffffff"/>
    <circle cx="22" cy="130" r="0.9" fill="#ffffff"/>
    <circle cx="240" cy="155" r="0.8" fill="#ffffff"/>
  </g>

  <!-- Asteroid body — irregular polygon, lower two-thirds -->
  <polygon
    points="
      72,118
      85,100
      105,92
      128,96
      150,90
      172,102
      192,122
      200,155
      195,195
      178,228
      148,244
      115,246
      82,234
      58,208
      48,172
      52,138
    "
    fill="url(#asteroid-grad)"
    clip-path="url(#circle-clip)"
  />

  <!-- Asteroid surface texture — subtle facets -->
  <g clip-path="url(#circle-clip)" opacity="0.18">
    <line x1="85" y1="100" x2="120" y2="140" stroke="#ffffff" stroke-width="1"/>
    <line x1="150" y1="90" x2="170" y2="145" stroke="#ffffff" stroke-width="0.8"/>
    <line x1="192" y1="122" x2="155" y2="175" stroke="#ffffff" stroke-width="0.7"/>
    <line x1="58" y1="208" x2="110" y2="195" stroke="#ffffff" stroke-width="0.6"/>
    <line x1="105" y1="92" x2="95" y2="160" stroke="#ffffff" stroke-width="0.7"/>
  </g>

  <!-- Tower — narrow vertical structure rising from asteroid surface -->
  <rect x="121" y="48" width="14" height="52" fill="#6e6e7e" clip-path="url(#circle-clip)"/>

  <!-- Tower shadow/depth -->
  <rect x="128" y="48" width="7" height="52" fill="#55555f" clip-path="url(#circle-clip)"/>

  <!-- Nexus windows — amber band at tower top (the most visible element) -->
  <rect x="109" y="46" width="38" height="10" rx="1" fill="#f5a030" filter="url(#amber-glow)" clip-path="url(#circle-clip)"/>
  <!-- Nexus window detail lines -->
  <line x1="119" y1="46" x2="119" y2="56" stroke="#c47800" stroke-width="1" opacity="0.6" clip-path="url(#circle-clip)"/>
  <line x1="128" y1="46" x2="128" y2="56" stroke="#c47800" stroke-width="1" opacity="0.6" clip-path="url(#circle-clip)"/>
  <line x1="137" y1="46" x2="137" y2="56" stroke="#c47800" stroke-width="1" opacity="0.6" clip-path="url(#circle-clip)"/>

  <!-- Director level — small cap above Nexus -->
  <rect x="119" y="38" width="18" height="10" fill="#5e5e6e" clip-path="url(#circle-clip)"/>

  <!-- Docking platform — extends right from asteroid flank -->
  <rect x="133" y="148" width="52" height="10" fill="#5a5a6a" clip-path="url(#circle-clip)"/>
  <!-- Platform underside -->
  <rect x="133" y="156" width="52" height="3" fill="#404050" clip-path="url(#circle-clip)"/>

  <!-- Platform support strut -->
  <rect x="155" y="148" width="5" height="22" fill="#505060" clip-path="url(#circle-clip)"/>

  <!-- Running lights on platform -->
  <circle cx="163" cy="148" r="3.5" fill="#f5a030" filter="url(#subtle-glow)" clip-path="url(#circle-clip)"/>
  <circle cx="178" cy="148" r="3.5" fill="#f5a030" filter="url(#subtle-glow)" clip-path="url(#circle-clip)"/>

  <!-- Docked runabout silhouette — simple wedge -->
  <polygon points="140,144 165,140 165,148 140,148" fill="#3a3a4a" clip-path="url(#circle-clip)"/>

  <!-- Weapons/sensor array — small details on surface -->
  <g clip-path="url(#circle-clip)" fill="#606070">
    <rect x="80" y="113" width="3" height="10" transform="rotate(-15 80 113)"/>
    <rect x="170" y="108" width="3" height="8" transform="rotate(10 170 108)"/>
  </g>
  <!-- Array tips — amber nav lights -->
  <circle cx="78" cy="108" r="2" fill="#f5a030" opacity="0.7" clip-path="url(#circle-clip)"/>
  <circle cx="173" cy="104" r="2" fill="#f5a030" opacity="0.7" clip-path="url(#circle-clip)"/>

  <!-- Phase 1 prefab structures — low boxes on surface -->
  <g clip-path="url(#circle-clip)" fill="#575768">
    <rect x="88" y="108" width="18" height="8"/>
    <rect x="160" y="112" width="14" height="7"/>
  </g>

  <!-- Outer ring border -->
  <circle cx="128" cy="128" r="122" fill="none" stroke="#2e2e42" stroke-width="3"/>
</svg>
